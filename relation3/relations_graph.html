  .link.uncertain { stroke-dasharray: 6 3; }
  .link.faded { stroke-opacity: 0.07; pointer-events: none; }
  .link.highlighted { stroke-width: 3px; stroke-opacity: 1; }

  .node circle {
    stroke: #fff; stroke-width: 2px;
    cursor: pointer; transition: r 0.15s;
  }
  .node.countess circle { stroke: #FFD700; stroke-width: 3.5px; }
  .node.faded circle { opacity: 0.1; }
  .node.faded text  { opacity: 0.1; }
  .node text {
    font-size: 10px; fill: #333; pointer-events: none;
    paint-order: stroke; stroke: #f5f5f5; stroke-width: 3px;
  }

  #sidebar {
    width: 280px; background: #fff; border-left: 1px solid #ddd;
    overflow-y: auto; padding: 0.75rem;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  #sidebar h2 { font-size: 0.9rem; font-weight: 700; color: #333; }
  #info-panel {
    background: #fafafa; border: 1px solid #eee;
    border-radius: 6px; padding: 0.6rem;
    font-size: 0.82rem; min-height: 60px; color: #555;
  }
  #info-panel .info-name { font-weight: 700; font-size: 0.95rem; color: #222; margin-bottom: 0.3rem; }
  #info-panel .info-rel { margin: 0.25rem 0; line-height: 1.5; }
  .pill {

  }
  #legend { display: flex; flex-direction: column; gap: 3px; }
  .legend-item {

  .legend-item:hover { background: #f5f5f5; }
  .legend-item.hidden { opacity: 0.35; text-decoration: line-through; }
  .legend-swatch { width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-count { color: #999; font-size: 0.74rem; margin-left: auto; }
  #tooltip {

03"]}, {"source": "P671", "target": "P0", "relation": "daughterOf", "certainty": "low", "mentions": 1, "paragraphs": ["P.503"]}, {"source": "P675", "target": "P0", "relation": "daughterOf", "certainty": "low", "mentions": 1, "paragraphs": ["P.503"]}, {"source": "P676", "target": "P0", "relation": "daughterOf", "certainty": "low", "mentions": 1, "paragraphs": ["P.503"]}, {"source": "P677", "target": "P0", "relation": "daughterOf", "certainty": "low", "mentions": 1, "paragraphs": ["P.503"]}, {"source": "P660", "target": "P42", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P661", "target": "P42", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P662", "target": "P42", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P663", "target": "P42", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P664", "target": "P42", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P29", "target": "P194", "relation": "daughterOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P671", "target": "P194", "relation": "daughterOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509"]}, {"source": "P171", "target": "P0", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.509", "P.571", "P.598"]}, {"source": "P332", "target": "P174", "relation": "wifeOf", "certainty": null, "mentions": 1, "paragraphs": ["P.550", "P.577"]}, {"source": "P171", "target": "P17", "relation": "childOf", "certainty": null, "mentions": 1, "paragraphs": ["P.571"]}, {"source": "P202", "target": "P0", "relation": "motherInLawOf", "certainty": null, "mentions": 1, "paragraphs": ["P.577"]}, {"source": "P171", "target": "P0", "relation": "sonOf", "certainty": null, "mentions": 1, "paragraphs": ["P.598"]}, {"source": "P87", "target": "P188", "relation": "wifeOf", "certainty": null, "mentions": 1, "paragraphs": ["P.644"]}, {"source": "P96", "target": "P0", "relation": "daughterOf", "certainty": null, "mentions": 1, "paragraphs": ["P.658"]}];
const COLORS = {"childOf": "#4CAF50", "daughterOf": "#66BB6A", "sonOf": "#81C784", "fatherOf": "#1565C0", "sisterOf": "#E91E63", "brotherOf": "#9C27B0", "siblingOf": "#CE93D8", "spouseOf": "#FF5722", "husbandOf": "#FF7043", "wifeOf": "#FFAB91", "mother-in-lawOf": "#795548", "father-in-lawOf": "#A1887F", "sister-in-lawOf": "#F06292", "brother-in-lawOf": "#AB47BC", "auntOf": "#00BCD4", "uncleOf": "#0097A7", "cousinOf": "#26C6DA", "relativeOf": "#90A4AE"};
const REL_TYPES = ["auntOf", "brotherInLawOf", "brotherOf", "childOf", "cousinOf", "daughterOf", "fatherInLawOf", "fatherOf", "husbandOf", "motherInLawOf", "relativeOf", "siblingOf", "sisterInLawOf", "sisterOf", "sonOf", "spouseOf", "uncleOf", "wifeOf"];

// Stats
document.getElementById('stats-label').textContent =
  `${NODES.length} persons · ${LINKS.length} distinct relations · ${LINKS.reduce((s,l)=>s+l.mentions,0)} text mentions`;

// Legend + filter
const hiddenTypes = new Set();
const legendEl = document.getElementById('legend');
const filterSel = document.getElementById('rel-filter');

REL_TYPES.forEach(rt => {
  const count = LINKS.filter(l => l.relation === rt).length;
  const color = COLORS[rt] || '#aaa';
  const row = document.createElement('div');
  row.className = 'legend-item';
  row.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>
    <span>${rt}</span><span class="legend-count">${count}</span>`;
  row.addEventListener('click', () => {
    hiddenTypes.has(rt) ? hiddenTypes.delete(rt) : hiddenTypes.add(rt);
    row.classList.toggle('hidden');
    applyFilter();
  });
  legendEl.appendChild(row);

  const opt = document.createElement('option');
  opt.value = rt; opt.textContent = rt;
  filterSel.appendChild(opt);
});
filterSel.addEventListener('change', applyFilter);

// SVG
const svg = d3.select('#svg');
const container = document.getElementById('graph-container');
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.05, 6])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append('defs');
REL_TYPES.forEach(rt => {
  const color = COLORS[rt] || '#aaa';
  defs.append('marker')
    .attr('id', `arrow-${rt}`)
    .attr('viewBox', '0 -4 8 8').attr('refX', 20).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
    .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', color);
});

// Simulation
const W = () => container.clientWidth;
const H = () => container.clientHeight;

const simulation = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).distance(100).strength(0.5))
  .force('charge', d3.forceManyBody().strength(-250))
  .force('collide', d3.forceCollide(24))
  .force('center', d3.forceCenter(W()/2, H()/2))
  .force('x', d3.forceX(W()/2).strength(0.04))
  .force('y', d3.forceY(H()/2).strength(0.04));

document.getElementById('charge-slider').addEventListener('input', function() {
  simulation.force('charge', d3.forceManyBody().strength(+this.value));
  simulation.alpha(0.3).restart();
});

const nodes = NODES.map(d => ({...d}));
const links = LINKS.map(d => ({...d}));

const linkSel = g.append('g')
  .selectAll('line').data(links).join('line')
    .attr('class', d => `link ${d.certainty ? 'uncertain' : ''}`)
    .attr('stroke', d => COLORS[d.relation] || '#aaa')
    .attr('marker-end', d => `url(#arrow-${d.relation})`)
    .on('mouseover', onLinkHover).on('mouseout', hideTooltip)
    .on('click', onLinkClick);

const nodeSel = g.append('g')
  .selectAll('g').data(nodes).join('g')
    .attr('class', d => `node${d.isCountess ? ' countess' : ''}`)
    .call(drag(simulation))
    .on('mouseover', onNodeHover).on('mouseout', hideTooltip)
    .on('click', onNodeClick);

nodeSel.append('circle')
  .attr('r', d => d.isCountess ? 14 : Math.max(6, 4 + d.degree * 0.5))
  .attr('fill', d => d.sex === 'female' ? '#e91e8c' : d.sex === 'male' ? '#1976d2' : '#78909c');

nodeSel.append('text')
  .attr('dy', d => (d.isCountess ? 20 : Math.max(6, 4 + d.degree * 0.5) + 6))
  .attr('text-anchor', 'middle')
  .text(d => d.name.length > 24 ? d.name.slice(0, 22) + '…' : d.name);

simulation.nodes(nodes).on('tick', () => {
  linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
         .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
});
simulation.force('link').links(links);

new ResizeObserver(() => {
  simulation.force('center', d3.forceCenter(W()/2, H()/2))
            .force('x', d3.forceX(W()/2).strength(0.04))
            .force('y', d3.forceY(H()/2).strength(0.04))
            .alpha(0.2).restart();
}).observe(container);

document.getElementById('reset-btn').addEventListener('click', () =>
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity));

// ── Filter ────────────────────────────────────────────────────────────────────
function applyFilter() {
  const selType = filterSel.value;
  linkSel
    .classed('faded', d => hiddenTypes.has(d.relation) || (selType && d.relation !== selType))
    .attr('display', d => hiddenTypes.has(d.relation) ? 'none' : null);
  if (selType) {
    const active = new Set();
    links.forEach(l => {
      if (l.relation === selType && !hiddenTypes.has(l.relation)) {
        active.add(typeof l.source === 'object' ? l.source.id : l.source);
        active.add(typeof l.target === 'object' ? l.target.id : l.target);
      }
    });
    nodeSel.classed('faded', d => !active.has(d.id));
  } else {
    nodeSel.classed('faded', false);
  }
}

// ── Tooltip & info panel ──────────────────────────────────────────────────────
const tooltip   = document.getElementById('tooltip');
const infoPanel = document.getElementById('info-panel');

function sid(l) { return typeof l.source === 'object' ? l.source.id : l.source; }
function tid(l) { return typeof l.target === 'object' ? l.target.id : l.target; }
function sname(l){ return typeof l.source === 'object' ? l.source.name : l.source; }
function tname(l){ return typeof l.target === 'object' ? l.target.name : l.target; }

function onNodeHover(event, d) {
  const count = links.filter(l => sid(l)===d.id || tid(l)===d.id).length;
  tooltip.innerHTML = `<strong>${d.name}</strong> (${d.id})<br>${d.sex} · ${count} relation(s)`;
  showTip(event);
}

function onLinkHover(event, d) {
  const color = COLORS[d.relation] || '#aaa';
  const cert  = d.certainty ? ` <em style="color:#ffa">(${d.certainty})</em>` : '';
  tooltip.innerHTML =
    `<strong>${sname(d)}</strong><br>
     <span style="color:${color}">→ ${d.relation} →</span><br>
     <strong>${tname(d)}</strong><br>
     ${d.mentions} mention(s)${cert}`;
  showTip(event);
}

function showTip(event) {
  tooltip.style.display = 'block';
  tooltip.style.left = (event.pageX + 14) + 'px';
  tooltip.style.top  = (event.pageY - 30) + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

function onNodeClick(event, d) {
  event.stopPropagation();
  const rels = links.filter(l => sid(l)===d.id || tid(l)===d.id);
  const nb   = new Set([d.id, ...rels.map(l=>sid(l)), ...rels.map(l=>tid(l))]);
  linkSel.classed('faded', l => !(nb.has(sid(l)) && nb.has(tid(l))));
  nodeSel.classed('faded', n => !nb.has(n.id));

  let html = `<div class="info-name">${d.name} (${d.id})</div>
    <div style="color:#888;margin-bottom:0.4rem">${d.sex} · ${rels.length} relation(s)</div>`;
  rels.forEach(l => {
    const color = COLORS[l.relation] || '#aaa';
    const cert  = l.certainty ? ` <span style="color:#e67e22;font-size:0.75rem">(${l.certainty})</span>` : '';
    html += `<div class="info-rel">
      <span class="pill" style="background:${color}">${l.relation}</span>
      ${sname(l)} → ${tname(l)}${cert}
      <span style="color:#bbb;font-size:0.74rem"> · ${l.mentions}×</span>
    </div>`;
  });
  infoPanel.innerHTML = html;
}

function onLinkClick(event, d) {
  event.stopPropagation();
  const color = COLORS[d.relation] || '#aaa';
  const cert  = d.certainty
    ? `<div class="info-rel" style="color:#e67e22">Certainty: ${d.certainty}</div>` : '';
  infoPanel.innerHTML =
    `<div class="info-name">
       <span class="pill" style="background:${color}">${d.relation}</span>
     </div>
     <div class="info-rel"><strong>Active:</strong> ${sname(d)} (${sid(d)})</div>
     <div class="info-rel"><strong>Passive:</strong> ${tname(d)} (${tid(d)})</div>
     <div class="info-rel"><strong>Mentions:</strong> ${d.mentions}</div>
     <div class="info-rel"><strong>Paragraphs:</strong> ${d.paragraphs.join(', ')}</div>
     ${cert}`;
}

svg.on('click', () => {
  linkSel.classed('faded', false);
  nodeSel.classed('faded', false);
  infoPanel.textContent = 'Click a node or edge.';
  applyFilter();
});

function drag(sim) {
  return d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; });
}
</script>
</body>
</html>
